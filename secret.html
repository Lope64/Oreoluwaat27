<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Page 🔐</title>
<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: radial-gradient(circle at top, #ffe6f2 0, #1b1033 40%, #05020a 100%);
        text-align: center;
        color: #ffd6f5;
        animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        margin-top: 60px;
        font-size: 2.4rem;
    }

    p {
        max-width: 600px;
        margin: 20px auto;
        font-size: 1.2rem;
        line-height: 1.7;
    }

    a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 22px;
        background: #ff8ac9;
        color: white;
        border-radius: 25px;
        text-decoration: none;
    }

    .star {
        position: fixed;
        width: 2px;
        height: 2px;
        background: #fff;
        border-radius: 50%;
        opacity: 0.8;
        animation: twinkle 3s infinite;
    }
    @keyframes twinkle {
        0%,100% { opacity: 0.2; }
        50% { opacity: 1; }
    }
</style>
</head>
<body>

<h1>You Found the Secret 💗</h1>

<p>
    I wasn’t sure you’d click this page…  
    but since you did, I guess I can tell you something a little extra.  
    You make everything feel lighter, softer, and somehow more fun.  
    And honestly? I adore that about you.
</p>

<a href="index.html">Back Home 💞</a>

<script>
    for (let i = 0; i < 80; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(star);
    }
</script>

</body>
</html>
