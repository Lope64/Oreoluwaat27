<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secret Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            background: url("IMG_7321.JPG") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 10px;
        }

        #proposalTimer {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

        a { color: #ffd6f6; font-weight: bold; }
    </style>
</head>
<body>
<div class="overlay">

    <p><a href="index.html">⬅ Back to Home</a></p>

    <div id="password-screen">
        <h2>Enter Password 🔒</h2>
        <input type="password" id="passInput">
        <button onclick="checkPass()">Unlock</button>
        <p id="wrong" style="color:red; display:none;">Incorrect password</p>
    </div>

    <div id="protected-content" style="display:none;">

        <div class="secret-photos">
            <img src="22.JPG" style="width:150px; border-radius:15px; margin:10px;">
            <img src="23.JPG" style="width:150px; border-radius:15px; margin:10px;">
        </div>

        <h2>Countdown to Our Proposal 💍</h2>
        <p>You said you want to know the date… so here it is.</p>

        <div id="proposalTimer"></div>

    </div>

</div>

<script>
function checkPass() {
    if (document.getElementById("passInput").value === "2727") {
        document.getElementById("password-screen").style.display = "none";
        document.getElementById("protected-content").style.display = "block";
    } else {
        document.getElementById("wrong").style.display = "block";
    }
}

function updateProposalTimer() {
    const endDate = new Date("December 1, 2027 00:00:00").getTime();
    const now = new Date().getTime();
    const diff = endDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    if (diff >= 0) {
        document.getElementById("proposalTimer").innerHTML =
            days + " days • " +
            hours + " hrs • " +
            minutes + " mins • " +
            seconds + " secs";
    } else {
        document.getElementById("proposalTimer").innerHTML = "The moment has arrived 💍❤️";
    }
}

setInterval(updateProposalTimer, 1000);
updateProposalTimer();
</script>

</body>
</html>
