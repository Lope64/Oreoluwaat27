<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday, My Love</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            background: url("IMG_7321.JPG") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 10px;
        }

        .birthday-banner {
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 20px;
            display: inline-block;
            animation: fadeIn 1.5s ease-out;
            position: relative;
        }

        .birthday-banner h1 {
            font-size: 40px;
            color: #ffd6f6;
            text-shadow: 0 0 10px #ff8ad6, 0 0 20px #ff5fc8;
            margin: 0;
        }

        .sparkles::before,
        .sparkles::after {
            content: "✨";
            position: absolute;
            font-size: 30px;
            animation: sparkle 2s infinite ease-in-out;
            opacity: 0;
        }

        .sparkles::before { top: -10px; left: -20px; }
        .sparkles::after { bottom: -10px; right: -20px; }

        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.3); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
        }

        a {
            color: #ffd6f6;
            text-decoration: none;
            font-weight: bold;
        }

        .links { margin-top: 40px; }
    </style>
</head>
<body>
<div class="overlay">

    <div class="birthday-banner">
        <h1>🎉 Happy Birthday, My Love 🎉</h1>
        <div class="sparkles"></div>
    </div>

    <div class="links">
        <p><a href="loveletter.html">Go to Love Letter 💌</a></p>
        <p><a href="memories.html">Go to Memories 📸</a></p>
        <p><a href="protected.html">Protected Page 🔒</a></p>
        <p><a href="secret.html">Secret Page 💍</a></p>
    </div>

    <div class="gallery">
        <img src="unnamed.jpg">
        <img src="2.JPG">
        <img src="10.jpeg">
        <img src="3.JPG">
        <img src="4.JPG">
        <img src="18.JPG">
        <img src="5.JPG">
        <img src="7.jpeg">
    </div>

</div>

<script>
window.onload = () => {
    document.querySelector(".sparkles").style.opacity = "1";
};
</script>

</body>
</html>
