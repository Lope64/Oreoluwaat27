<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love Letter</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            background: url("IMG_7321.JPG") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 10px;
        }

        .slideshow-container {
            max-width: 600px;
            margin: 20px auto;
        }

        .mySlides { display: none; }
        .mySlides img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }

        .love-message {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: rgba(0, 0, 0, 0.45);
            padding: 25px;
            border-radius: 15px;
            text-align: left;
            line-height: 1.6;
        }

        .music-player {
            width: 90%;
            max-width: 600px;
            margin: 20px auto 40px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a { color: #ffd6f6; font-weight: bold; }
    </style>
</head>
<body>
<div class="overlay">

    <p><a href="index.html">⬅ Back to Home</a></p>

    <div class="slideshow-container">
        <div class="mySlides"><img src="8.jpeg"></div>
        <div class="mySlides"><img src="12.JPG"></div>
        <div class="mySlides"><img src="11.jpeg"></div>
        <div class="mySlides"><img src="13.jpg"></div>
        <div class="mySlides"><img src="9.JPG"></div>
    </div>

    <h2>Our Songs 🎵</h2>

    <div class="music-player">
        <!-- All 7 Spotify embeds -->
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/1bhUWB0zJMIKr9yVPrkEuI?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2Bv0cdN1Bnf1wnXytWyqJd?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0OjOPEq8X1I0i3tn79lnY3?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0PqiJTvvmEiV3rTZcQ7SIS?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/7KTHlwl3xN7ngysoOJoIu7?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/5sv0WnUs74Orn6GoPmC5im?utm_source=generator" width="100%" height="352"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/1i4F583d9v9RabcfOlKKVL?utm_source=generator" width="100%" height="352"></iframe>
    </div>

    <div class="love-message">
        <p>My love, I love you always...</p>
        <blockquote>“All words in the dictionaries died…”</blockquote>
        <p>Yours with all my heart – Tolulope.</p>
    </div>

</div>

<script>
let slideIndex = 0;
showSlides();

function showSlides() {
    const slides = document.getElementsByClassName("mySlides");
    for (let s of slides) s.style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 3000);
}
</script>

</body>
</html>
