<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protected Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            background: url("IMG_7321.JPG") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 10px;
        }

        #password-screen {
            margin-top: 80px;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
        }

        .polaroids {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .polaroid {
            background: #fff;
            color: #000;
            width: 150px;
            padding: 10px;
            border-radius: 10px;
        }

        .polaroid img {
            width: 100%;
            border-radius: 5px;
        }

        a { color: #ffd6f6; font-weight: bold; }
    </style>
</head>
<body>
<div class="overlay">

    <p><a href="index.html">⬅ Back to Home</a></p>

    <div id="password-screen">
        <h2>Enter Password 🔒</h2>
        <input type="password" id="passInput">
        <button onclick="checkPass()">Unlock</button>
        <p id="wrong" style="color:red; display:none;">Incorrect password</p>
    </div>

    <div id="protected-content" style="display:none;">
        <h2>Our Personal Story ❤️</h2>

        <div class="polaroids">
            <div class="polaroid"><img src="13.jpg"><p>Us 💕</p></div>
            <div class="polaroid"><img src="11.jpeg"><p>Laughing together 😂</p></div>
            <div class="polaroid"><img src="8.jpeg"><p>My favorite picture ✨</p></div>
            <div class="polaroid"><img src="21.JPG"><p>Unforgettable moment ❤️</p></div>
            <div class="polaroid"><img src="20.JPG"><p>My heart 💗</p></div>
            <div class="polaroid"><img src="25.jpg"><p>Forever us 💞</p></div>
            <div class="polaroid"><img src="12.JPG"><p>Always yours 💫</p></div>
        </div>
    </div>

</div>

<script>
function checkPass() {
    if (document.getElementById("passInput").value === "2727") {
        document.getElementById("password-screen").style.display = "none";
        document.getElementById("protected-content").style.display = "block";
    } else {
        document.getElementById("wrong").style.display = "block";
    }
}
</script>

</body>
</html>
