<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories 📸</title>
<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #fff0f7;
        text-align: center;
        color: #444;
        animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        margin-top: 40px;
        font-size: 2.3rem;
        color: #ff5fa2;
    }

    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
        gap: 20px;
    }

    .pic {
        width: 200px;
        height: 200px;
        background-size: cover;
        background-position: center;
        border-radius: 20px;
        box-shadow: 0 0 20px #ffb3d9;
    }

    a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 22px;
        background: #ff8ac9;
        color: white;
        border-radius: 25px;
        text-decoration: none;
    }
</style>
</head>
<body>

<h1>Our Memories 💞</h1>

<div class="gallery">
    <div class="pic" style="background-image: url('PHOTO1.jpg');"></div>
    <div class="pic" style="background-image: url('PHOTO2.jpg');"></div>
    <div class="pic" style="background-image: url('PHOTO3.jpg');"></div>
</div>

<a href="index.html">Back Home 💗</a>

</body>
</html>
